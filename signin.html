<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Sign-In</title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>

    <!-- LOGO -->
    <div class="signin-logo">
        <a href="index.html">
            <div class="logo"></div>
        </a>
    </div>

    <!-- SIGN IN CARD -->
    <div class="signin-card">
        <h2>Sign in or create account</h2>

        <label for="email">Enter mobile number or email</label>
        <input type="text" id="email" name="email" autofocus>

        <button class="continue-btn">Continue</button>

        <p class="signin-terms">
            By continuing, you agree to Amazon's 
            <a href="#">Conditions of Use</a> and 
            <a href="#">Privacy Notice</a>.
        </p>

        <a href="#" class="need-help">Need help?</a>

        <hr class="signin-divider">

        <div class="business-section">
            Buying for work?
            <a href="#">Create a free business account</a>
        </div>
    </div>

    <!-- NEW CUSTOMER -->
    <div class="new-customer">New to Amazon?</div>
    <a href="#" class="create-account-btn">Create your Amazon account</a>

    <!-- FOOTER -->
    <div class="signin-footer">
        <div class="footer-links">
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Help</a>
        </div>
        <div class="copyright">© 1996-2026, Amazon.com, Inc. or its affiliates</div>
    </div>

</body>
</html>
